<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Signal Feed — Live Messages</title>
<style>
  :root{
    --bg: #0a0e12;
    --surface: #11161d;
    --surface-2: #161d26;
    --line: #232b35;
    --text: #e7edf3;
    --muted: #6b7785;
    --accent: #4fd1c5;
    --accent-dim: rgba(79,209,197,0.16);
    --amber: #f2a65a;
    --mono: 'JetBrains Mono', 'Courier New', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Inter, sans-serif;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 50% 0%, rgba(79,209,197,0.06), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:var(--sans);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:24px 16px 100px;
  }

  .frame{
    width:100%;
    max-width:480px;
  }

  /* header */
  .top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:18px;
  }

  .feed-label{
    display:flex;
    align-items:center;
    gap:8px;
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:0.18em;
    color:var(--accent);
    text-transform:uppercase;
  }

  .dot{
    width:8px; height:8px;
    border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 0 0 var(--accent-dim);
    animation: pulse 1.6s infinite;
  }
  .dot.off{ background:var(--muted); animation:none; box-shadow:none; }

  @keyframes pulse{
    0%{ box-shadow:0 0 0 0 var(--accent-dim); }
    70%{ box-shadow:0 0 0 8px transparent; }
    100%{ box-shadow:0 0 0 0 transparent; }
  }

  .counter{
    font-family:var(--mono);
    font-size:12px;
    color:var(--muted);
  }
  .counter b{ color:var(--text); }

  h1{
    font-family:var(--mono);
    font-size:22px;
    font-weight:600;
    letter-spacing:-0.01em;
    margin:0 0 4px;
  }
  .sub{
    color:var(--muted);
    font-size:13px;
    margin:0 0 20px;
  }

  /* feed */
  .feed{
    display:flex;
    flex-direction:column;
    gap:10px;
    min-height:120px;
  }

  .empty{
    border:1px dashed var(--line);
    border-radius:12px;
    padding:28px 16px;
    text-align:center;
    color:var(--muted);
    font-size:13px;
  }

  .msg{
    background:var(--surface);
    border:1px solid var(--line);
    border-left:3px solid var(--accent);
    border-radius:10px;
    padding:12px 14px;
    animation: drop 0.4s ease-out;
    position:relative;
    overflow:hidden;
  }

  .msg.flash::before{
    content:'';
    position:absolute;
    inset:0;
    background:var(--accent);
    opacity:0.18;
    animation: flash 0.6s ease-out forwards;
  }

  @keyframes flash{ to{ opacity:0; } }

  @keyframes drop{
    from{ opacity:0; transform: translateY(-10px); }
    to{ opacity:1; transform: translateY(0); }
  }

  .msg-top{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:4px;
  }

  .sender{
    font-weight:600;
    font-size:13.5px;
  }

  .time{
    font-family:var(--mono);
    font-size:11px;
    color:var(--muted);
  }

  .text{
    font-size:14px;
    line-height:1.45;
    color:#cfd8e0;
  }

  /* controls — fixed bottom bar */
  .controls{
    position:fixed;
    bottom:0; left:0; right:0;
    display:flex;
    justify-content:center;
    padding:16px;
    background:linear-gradient(to top, var(--bg) 60%, transparent);
  }

  .bar{
    width:100%;
    max-width:480px;
    display:flex;
    gap:10px;
    align-items:center;
  }

  button{
    font-family:var(--sans);
    font-weight:600;
    font-size:14px;
    border:none;
    border-radius:10px;
    padding:13px 18px;
    cursor:pointer;
    transition: transform 0.15s, opacity 0.15s;
  }
  button:active{ transform: scale(0.97); }

  #toggleBtn{
    flex:1;
    background:var(--accent);
    color:#06201d;
  }
  #toggleBtn.running{
    background:var(--surface-2);
    color:var(--text);
    border:1px solid var(--line);
  }

  #resetBtn{
    background:var(--surface-2);
    color:var(--muted);
    border:1px solid var(--line);
  }

  .vibe-note{
    font-family:var(--mono);
    font-size:11px;
    color:var(--muted);
    text-align:center;
    margin-top:10px;
  }
  .vibe-note span{ color:var(--amber); }
</style>
</head>
<body>

<div class="frame">
  <div class="top">
    <div class="feed-label"><span class="dot off" id="statusDot"></span><span id="statusText">PAUSED</span></div>
    <div class="counter">Messages: <b id="count">0</b></div>
  </div>

  <h1>Live Message Feed</h1>
  <p class="sub">Har 5 second me ek naya message aayega — saath me phone vibrate hoga.</p>

  <div class="feed" id="feed">
    <div class="empty" id="emptyState">Start dabao, messages aana shuru ho jaayenge.</div>
  </div>
</div>

<div class="controls">
  <div class="frame bar">
    <button id="toggleBtn">Start</button>
    <button id="resetBtn">Reset</button>
  </div>
</div>

<script>
  const messages = [
    { name: "Rahul", text: "Bhai kal milne aa raha hai kya?" },
    { name: "Priya", text: "Meeting 4 baje shift ho gayi hai." },
    { name: "Mom", text: "Khaana khaya ya nahi abhi tak?" },
    { name: "Amit", text: "Project ka file bhej de jaldi." },
    { name: "Zomato", text: "Your order is out for delivery." },
    { name: "Sneha", text: "Movie dekhne chalna hai weekend pe?" },
    { name: "Bank Alert", text: "OTP shared with anyone? Never do that." },
    { name: "Vikram", text: "Match dekh raha hai? Kya scene hai!" },
    { name: "Riya", text: "Tumhara birthday plan ready hai 🎉" },
    { name: "Office Group", text: "Tomorrow's standup moved to 10am." }
  ];

  const feed = document.getElementById('feed');
  const emptyState = document.getElementById('emptyState');
  const toggleBtn = document.getElementById('toggleBtn');
  const resetBtn = document.getElementById('resetBtn');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const countEl = document.getElementById('count');

  let timer = null;
  let count = 0;
  let msgIndex = 0;

  function vibrateDevice(){
    if ('vibrate' in navigator) {
      navigator.vibrate(200);
    }
  }

  function timeNow(){
    const d = new Date();
    return d.toLocaleTimeString('en-IN', { hour: '2-digit', minute:'2-digit', second:'2-digit' });
  }

  function addMessage(){
    if (emptyState) emptyState.remove();

    const m = messages[msgIndex % messages.length];
    msgIndex++;
    count++;
    countEl.textContent = count;

    const el = document.createElement('div');
    el.className = 'msg flash';
    el.innerHTML = `
      <div class="msg-top">
        <span class="sender">${m.name}</span>
        <span class="time">${timeNow()}</span>
      </div>
      <div class="text">${m.text}</div>
    `;
    feed.prepend(el);
    vibrateDevice();
  }

  function start(){
    if (timer) return;
    addMessage();
    timer = setInterval(addMessage, 5000);
    toggleBtn.textContent = 'Pause';
    toggleBtn.classList.add('running');
    statusDot.classList.remove('off');
    statusText.textContent = 'LIVE';
  }

  function pause(){
    clearInterval(timer);
    timer = null;
    toggleBtn.textContent = 'Start';
    toggleBtn.classList.remove('running');
    statusDot.classList.add('off');
    statusText.textContent = 'PAUSED';
  }

  toggleBtn.addEventListener('click', () => {
    if (timer) pause(); else start();
  });

  resetBtn.addEventListener('click', () => {
    pause();
    feed.innerHTML = '<div class="empty" id="emptyState">Start dabao, messages aana shuru ho jaayenge.</div>';
    count = 0;
    msgIndex = 0;
    countEl.textContent = 0;
  });
</script>

</body>
</html>
